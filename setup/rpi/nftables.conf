#!/usr/sbin/nft -f
# RPi Guardian - nftables firewall + NAT (HTTP-only demo).
# Copy to /etc/nftables.conf on the Raspberry Pi, then: sudo nft -f /etc/nftables.conf
#
#   PREROUTING : redirect Computer A's TCP/80 traffic into mitmproxy (:8080)
#   POSTROUTING: masquerade forwarded traffic leaving eth0 towards Computer B

flush ruleset

table ip nat {
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;
        iifname "wlan0" tcp dport 80 redirect to :8080
    }
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        oifname "eth0" masquerade
    }
}
