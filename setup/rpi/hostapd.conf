# RPi Guardian - hostapd access point config (wlan0).
# Copy to /etc/hostapd/hostapd.conf on the Raspberry Pi.
# Computer A connects to this WiFi network.

interface=wlan0
driver=nl80211
ssid=RPi-Guardian
hw_mode=g
channel=6
auth_algs=1
wpa=2
wpa_passphrase=guardian123
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
