# RPi Guardian - dnsmasq DHCP config for Computer A (wlan0).
# Copy to /etc/dnsmasq.conf on the Raspberry Pi.
# Hands out 192.168.4.10-100 to clients on the RPi-Guardian network.

interface=wlan0
bind-interfaces
dhcp-range=192.168.4.10,192.168.4.100,255.255.255.0,24h
# The RPi (192.168.4.1) is the gateway and DNS server for Computer A.
dhcp-option=3,192.168.4.1
dhcp-option=6,192.168.4.1
